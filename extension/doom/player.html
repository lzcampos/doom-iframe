<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebDOOM (embed player)</title>
    <style>
      html,
      body {
        font-family: system-ui, sans-serif;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        color: #fff;
      }

      /* No border/padding on canvas — mouse coords stay correct */
      canvas {
        border: 0;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* Full-page player */
      html:not(.doom-embed) canvas {
        width: 160vh;
        height: 100vh;
        max-width: 100vw;
      }

      /* Inside iframe / ?embed=1 */
      html.doom-embed {
        font-size: 100%;
      }
      html.doom-embed,
      html.doom-embed body {
        display: block;
        overflow: hidden;
      }
      html.doom-embed canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #container {
        position: fixed;
        display: flex;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
        z-index: 2;
        pointer-events: none;
      }
      html.doom-embed #container {
        background: #000;
      }

      #spinner-container {
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
      }

      #spinner {
        height: 30px;
        width: 30px;
        margin: 0;
        display: inline-block;
        animation: rotation 0.8s linear infinite;
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-top: 5px solid #e00;
        border-radius: 100%;
        background-color: transparent;
      }

      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-left: 20px;
        font-weight: bold;
        color: #e00;
      }

      #progress {
        height: 20px;
        width: min(300px, 90vw);
      }

      progress::-moz-progress-bar,
      progress::-webkit-progress-value {
        background: #e00;
      }

      progress {
        color: #e00;
      }

      @keyframes rotation {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="spinner-container">
        <div id="spinner"></div>
        <div id="status">Downloading…</div>
        <progress value="0" max="100" id="progress" hidden></progress>
      </div>
    </div>

    <canvas id="canvas" tabindex="0"></canvas>

    <script src="player-shell.js"></script>
    <script async src="index.js"></script>
  </body>
</html>
